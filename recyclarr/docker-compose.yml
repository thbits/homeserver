services:
  recyclarr:
    image: ghcr.io/recyclarr/recyclarr:8.6@sha256:3c38ceeb54438dd8327e4e65c9b48ba601a6d20fff833342d93c9b0bc4b1930b
    container_name: recyclarr
    user: 1000:1000
    volumes:
      - ${DATADIR}/recyclarr/config:/config
      - ${CONFIGDIR}/recyclarr/recyclarr.yml:/config/recyclarr.yml
    environment:
      - TZ=${TIMEZONE}
      - SONARR_API_KEY=${SONARR_API_KEY}
      - RADARR_API_KEY=${RADARR_API_KEY}
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    external: true