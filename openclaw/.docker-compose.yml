services:
  openclaw:
    build: ./gateway
    image: openclaw-gateway:2026.4.2
    container_name: openclaw
    restart: unless-stopped
    group_add:
      - "990"
    environment:
      - TZ=${TIMEZONE}
      - OPENCLAW_SANDBOX=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.openclaw.rule=Host(`openclaw.${DOMAIN_NAME}`)
      - traefik.http.routers.openclaw.entrypoints=websecure
      - traefik.http.routers.openclaw.tls=true
      - traefik.http.routers.openclaw.tls.certresolver=myclouddns
      - traefik.http.services.openclaw.loadbalancer.server.port=18789
      - traefik.http.routers.openclaw.middlewares=geoblock@file,crowdsec-bouncer@docker,authelia-forwardauth@docker
      - homepage.group=Other
      - homepage.name=OpenClaw
      - homepage.icon=https://openclaw.ai/favicon.svg
      - homepage.href=https://openclaw.${DOMAIN_NAME}/
      - homepage.description=AI assistant gateway and bot platform
    volumes:
      - ${DATADIR}/openclaw:/home/node/.openclaw
      - ${CONFIGDIR}/openclaw/config/openclaw.json:/app/config/openclaw.json:ro
      - /data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro
      - ${DATADIR}/openclaw/playwright-cache:/home/node/.cache/ms-playwright
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/healthz"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal

  openclaw-sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: openclaw-sandbox:bookworm-slim
    pull_policy: build
    restart: "no"
    command: ["sh", "-c", "docker rm -f $$(docker ps -aq --filter name=openclaw-sbx) 2>/dev/null; echo sandbox image ready"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker:ro

networks:
  internal:
    external: true
