services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest@sha256:a4e2089b3531eec8c9328c7a9a586f80e8d67dcd94856e0b596b7896e1de3f62
    container_name: cloudflare-ddns
    security_opt:
      - no-new-privileges:true
    network_mode: 'host'
    read_only: true
    cap_drop:
      - all
    environment:
      - CLOUDFLARE_API_TOKEN=${CF_DNS_API_TOKEN}
      - DOMAINS=nullflix.uk,*.nullflix.uk,wg.nullflix.uk
      - IP6_PROVIDER=none
    restart: unless-stopped
