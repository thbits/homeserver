services:
  sablier:
    image: sablierapp/sablier:1.13.0@sha256:d53d9250ab4db4fc06df4bb85ee0893664d08b00422ef7d6c46f26865d564d5b
    container_name: sablier
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TIMEZONE}
      - PROVIDER_NAME=docker
      - STRATEGY_DYNAMIC_SHOW_DETAILES_BY_DEFAULT=true
      - PROVIDER_DOCKER_STRATEGY=stop
    networks:
      - internal

networks:
  internal:
    external: true

